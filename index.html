<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java Jeopardy</title>
    <link rel="icon" href="/EECSLogo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/EECSLogo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Space Grotesk"', "system-ui", "sans-serif"],
              mono: ['"JetBrains Mono"', "ui-monospace", "monospace"],
            },
            boxShadow: {
              board: "inset 0 1px 0 rgba(255,255,255,0.04)",
              "board-hover": "inset 0 1px 0 rgba(255,255,255,0.07)",
            },
          },
        },
      };
    </script>
    <style>
      @keyframes jeopardy-modal-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .jeopardy-modal-panel {
        animation: jeopardy-modal-in 0.18s ease-out;
      }
      /* Hide number input spinners (Chrome, Safari, Edge, Firefox) */
      input.jeopardy-score::-webkit-outer-spin-button,
      input.jeopardy-score::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input.jeopardy-score {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      /* Global dark scrollbars */
      html {
        scrollbar-color: rgba(100, 116, 139, 0.9) rgba(15, 23, 42, 0.85);
        scrollbar-width: thin;
      }
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      *::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.82);
        border-radius: 999px;
      }
      *::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(100, 116, 139, 0.95), rgba(71, 85, 105, 0.95));
        border: 2px solid rgba(15, 23, 42, 0.9);
        border-radius: 999px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(148, 163, 184, 0.95), rgba(100, 116, 139, 0.95));
      }
      *::-webkit-scrollbar-corner {
        background: rgba(15, 23, 42, 0.82);
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
